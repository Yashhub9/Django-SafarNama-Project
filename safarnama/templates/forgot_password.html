<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* General Styles */
body {
    font-family: Arial, sans-serif;
    background-color: #f8f9fa;
    margin: 0;
    padding: 0;
}

/* Forgot Password Section */
.forgot-password-section {
    padding: 50px 0;
    background-color: #f0f8ff; /* Light background for the section */
}

.forgot-password-form {
    background-color: #ffffff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.forgot-password-form h3 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    color: #343a40;
}

.form-group label {
    font-weight: bold;
    color: #495057;
    display: block;
    margin-bottom: 5px;
}

.form-control {
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 5px;
    transition: all 0.3s ease-in-out;
}

.form-control:focus {
    border-color: #ffa500; /* Focus color */
    box-shadow: 0 0 4px rgba(255, 165, 0, 0.5); /* Light shadow on focus */
    outline: none;
}

.btn-warning {
    background-color: #3e54e7;
    border: none;
    font-size: 1rem;
    color: #fff;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease-in-out;
}

.btn-warning:hover {
    background-color: #e69500;
}

.alert {
    padding: 10px 15px;
    margin-bottom: 20px;
    border-radius: 5px;
    font-size: 0.9rem;
}

.alert.success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.alert.error {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

.alert.info {
    background-color: #d1ecf1;
    color: #0c5460;
    border: 1px solid #bee5eb;
}

/* Responsive Design */
@media (max-width: 768px) {
    .forgot-password-section {
        padding: 30px 15px;
    }

    .forgot-password-form {
        padding: 15px;
    }
}

    </style>
</head>
<body>
    <section class="forgot-password-section">
        <div class="container">
        <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
        <form class="forgot-password-form shadow p-4 rounded" method="POST"> {% csrf_token %}
        {% if messages %}
        {% for message in messages %}
        <div class="alert {{ message.tags }}">
        {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        <h3 class="text-center">Forgot Password</h3>
        <div class="form-group mb-3">
        <label for="email">Enter your registered email:</label>
        <input type="email" class="form-control" name="email" id="email" required>
        </div>
        <input type="submit" class="btn btn-warning w-100 mt-2" value="Reset Password"> </form>
        </div>
        </div>
        </div>
        </section>
</body>
</html>
