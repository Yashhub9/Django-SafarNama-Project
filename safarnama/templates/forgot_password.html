{% extends "base.html" %}

{% block title %}Safarnama | Forgot Password{% endblock title %}

{% block body %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card reveal-up">
            <p class="eyebrow"><i class="fa-solid fa-key"></i> Password recovery</p>
            <h1>Forgot your password?</h1>
            <p class="mini-note mb-4">Enter your registered email address and we’ll send you a one-time password.</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="email" class="form-label">Registered email</label>
                    <input type="email" class="form-control" name="email" id="email" required>
                </div>
                <button type="submit" class="btn btn-brand w-100">Send OTP</button>
            </form>
        </div>
    </div>
</section>
{% endblock body %}
