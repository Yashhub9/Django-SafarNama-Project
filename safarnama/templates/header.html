{% load static %}
<header class="site-header">
    <div class="topbar d-none d-lg-block">
        <div class="container topbar-inner">
            <div class="topbar-copy">
                <span><i class="fa-solid fa-envelope"></i> safarnama9@gmail.com</span>
                <span><i class="fa-solid fa-phone"></i> +91 99999 99999</span>
            </div>
            <div class="topbar-copy">
                <span>Curated holidays across India</span>
                <div class="social-links">
                    <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-shell">
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-light">
                <a href="/" class="navbar-brand brand-mark">
                    <span class="brand-mark__icon">
                        <i class="fa-solid fa-compass"></i>
                    </span>
                    <span>
                        <strong>Safar</strong>Nama
                    </span>
                </a>

                <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarCollapse">
                    <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
                        <a href="/aboutus" class="nav-link {% if '/aboutus' in request.path %}active{% endif %}">About</a>
                        <a href="/index" class="nav-link {% if '/index' in request.path or '/productdetails/' in request.path %}active{% endif %}">Packages</a>
                        <a href="/contactus/" class="nav-link {% if '/contact' in request.path %}active{% endif %}">Contact</a>
                    </div>

                    <form action="{% url 'search_products' %}" method="get" class="search-form ms-lg-4">
                        <div class="search-form__field">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" name="q" value="{{ request.GET.q }}" placeholder="Search destinations" aria-label="Search destinations">
                        </div>
                        <button type="submit" class="btn btn-brand">Search</button>
                    </form>

                    <div class="auth-actions ms-lg-4">
                        {% if user.is_authenticated %}
                        <span class="user-pill">Hello, {{ user.username }}</span>
                        <a class="btn btn-outline-brand" href="/logout">Logout</a>
                        {% else %}
                        <a class="btn btn-outline-brand" href="/register">Register</a>
                        <a class="btn btn-brand" href="/login">Login</a>
                        {% endif %}
                    </div>
                </div>
            </nav>
        </div>
    </div>
</header>
