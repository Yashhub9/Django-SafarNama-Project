<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</head>
<style>
    /* General Body Styles */
body {
    font-family: Arial, sans-serif;
    background-color: #f8f9fa;
    margin: 0;
    padding: 0;
}

/* OTP Verification Section */
.otp-verification-section {
    background-color: #f0f8ff; /* Light blue background */
    padding: 50px 0;
}

.otp-verification-form {
    background-color: #ffffff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.otp-verification-form h3 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    color: #343a40;
}

.form-group label {
    font-weight: bold;
    color: #495057;
    display: block;
    margin-bottom: 5px;
}

.form-control {
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 5px;
    transition: all 0.3s ease-in-out;
}

.form-control:focus {
    border-color: #ffa500;
    box-shadow: 0 0 4px rgba(255, 165, 0, 0.5);
    outline: none;
}

.btn-warning {
    background-color: #2164f4;
    border: none;
    font-size: 1rem;
    color: #fff;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease-in-out;
}

.btn-warning:hover {
    background-color: #e69500;
}

.alert {
    padding: 10px 15px;
    margin-bottom: 15px;
    border-radius: 5px;
    font-size: 0.9rem;
}

.alert.alert-success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.alert.alert-danger {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

/* Responsive Design */
@media (max-width: 768px) {
    .otp-verification-form {
        padding: 15px;
    }

    .otp-verification-section {
        padding: 30px 15px;
    }
}

</style>
<body>
    <section class="otp-verification-section">
        <div class="container">
          <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-6 col-lg-4">
              <form class="otp-verification-form shadow p-4 rounded" method="POST">
                {% csrf_token %}
                <h3 class="text-center mb-4">Enter OTP</h3>
      
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
      
                <div class="form-group mb-3">
                  <label for="otp">OTP:</label>
                  <input type="text" class="form-control" name="otp" id="otp" required>
                </div>
      
                <button type="submit" class="btn btn-warning w-100 mt-2">Verify OTP</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    
</body>
</html>
