{% extends "base.html" %}

{% block title %}Safarnama | Verify OTP{% endblock title %}

{% block body %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card reveal-up">
            <p class="eyebrow"><i class="fa-solid fa-shield"></i> OTP verification</p>
            <h1>Enter the OTP</h1>
            <p class="mini-note mb-4">Type the one-time password sent to your email to continue resetting your password.</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="otp" class="form-label">One-time password</label>
                    <input type="text" class="form-control" name="otp" id="otp" required>
                </div>
                <button type="submit" class="btn btn-brand w-100">Verify OTP</button>
            </form>
        </div>
    </div>
</section>
{% endblock body %}
