<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <title>Google Form Reviews</title>
</head>
<body>
    <h1>Fetch Reviews</h1>
    <p>{{ message }}</p>
    <ul>
        {% for review in reviews %}
            <li>
                <strong>{{ review.name }}</strong>: {{ review.review }}
                <br>
                <small>Rating: {{ review.rating }} | Submitted on: {{ review.created_at }}</small>
            </li>
        {% endfor %}
    </ul>


</body>
</html>
