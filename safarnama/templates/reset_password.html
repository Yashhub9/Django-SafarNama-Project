<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* General Styles */
body {
    font-family: 'Arial', sans-serif;
    background-color: #f7f9fc; /* Soft blue background */
    margin: 0;
    padding: 0;
}

/* Reset Password Section */
.reset-password-section {
    padding: 50px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.reset-password-form {
    background-color: #ffffff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 50px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

.reset-password-form h3 {
    font-size: 1.5rem;
    color: #333;
    margin-bottom: 20px;
    text-align: center;
}

.form-group label {
    font-weight: 600;
    color: #495057;
    display: block;
    margin-bottom: 8px;
}

.form-control {
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 5px;
    transition: all 0.3s ease;
}

.form-control:focus {
    border-color: #ffa500;
    box-shadow: 0 0 4px rgba(255, 165, 0, 0.5);
    outline: none;
}

.btn-warning {
    background-color: #4e35de;
    border: none;
    font-size: 1rem;
    color: #fff;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease-in-out;
}

.btn-warning:hover {
    background-color: #e69500;
}

.alert {
    padding: 10px 15px;
    border-radius: 5px;
    margin-bottom: 20px;
    font-size: 0.9rem;
}

.alert.alert-info {
    background-color: #d1ecf1;
    color: #0c5460;
    border: 1px solid #bee5eb;
}

/* Responsive Design */
@media (max-width: 768px) {
    .reset-password-form {
        padding: 15px;
    }

    .reset-password-section {
        padding: 30px 15px;
    }
}

</style>
<body>
    <section class="reset-password-section"> 
        <div class="container"> 
        <div class="row justify-content-center"> 
        <div class="col-md-6 col-lg-4"> 
        <form class="reset-password-form shadow p-4 rounded" method="POST"> {% csrf_token %} 
        {% if messages %} 
        <div class="alert alert-info"> 
        {% for message in messages %} 
        <p>{{ message }}</p> 
        {% endfor %} 
        </div> 
        {% endif %} 
        <h3 class="text-center">Reset Your Password</h3> 
        <div class="form-group mb-3"> 
        <label for="password">New Password:</label> 
        <input type="password" class="form-control" name="password" id="password" required> <br>
        <label for="password">Confirm Password:</label> 
        <input type="password" class="form-control" name="confirm_password" id="confirm_password" required> 
    </div> 
        <input type="submit" class="btn btn-warning w-100 mt-2" value="Submit"> 
        </form> 
        </div> 
        </div> 
        </div> 
        </section>
</body>
</html>
