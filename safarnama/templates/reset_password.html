{% extends "base.html" %}

{% block title %}Safarnama | Reset Password{% endblock title %}

{% block body %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card reveal-up">
            <p class="eyebrow"><i class="fa-solid fa-lock"></i> Reset password</p>
            <h1>Create a new password</h1>
            <p class="mini-note mb-4">Choose a strong password and confirm it to finish recovery.</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="password" class="form-label">New password</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                </div>
                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm password</label>
                    <input type="password" class="form-control" name="confirm_password" id="confirm_password" required>
                </div>
                <button type="submit" class="btn btn-brand w-100">Update Password</button>
            </form>
        </div>
    </div>
</section>
{% endblock body %}
